  <style>

    *{box-sizing:border-box}
    body{font-family:'Cairo',sans-serif;margin:0;padding:16px;background:#fff}

    .main-header{max-width:1100px;margin:0 auto 16px;padding:14px 18px;border:1px solid #e0e0e0;border-radius:12px;box-shadow:0 3px 12px rgba(0,0,0,.05);position:relative}

    .grid{display:grid;grid-template-columns:260px 1fr 260px 1fr;gap:10px;align-items:center}
    label{font-weight:800;color:#0a3d73}
    input{width:100%;height:38px;border-radius:10px;border:1px solid #c7d8f0;padding:8px 10px;font-size:14px;outline:none}

    .save{background:#0b8c4a}
    .cancel{background:#6c757d;display:none}

    .tools{max-width:1100px;margin:0 auto 10px;display:flex;justify-content:center}
    .tools input{min-width:320px;padding:9px 10px;border-radius:10px;border:1px solid #ccc}

    .sig-title { font-weight:700; color:#0a3d73; white-space:nowrap; font-size:15px; }

    /* شبكة مخصصة لتقرير الشؤون الإدارية */
.violation-grid{
  display:grid;
  grid-template-columns: 1fr 1fr;  /* عمودين */
  gap: 12px 16px;
  align-items:end;
}

/* كل حقل */
.violation-grid .field{
  display:flex;
  flex-direction:column;
  gap:6px;
}

/* عناصر بعرض كامل */
.violation-grid .full{
  grid-column: 1 / -1;
}

/* تنسيق الليبل */
.violation-grid label{
  font-weight: 800;
  color: #0a3d73;
  font-size: 15px;
}

/* تنسيق الحقول */
.violation-grid select,
.violation-grid input{
  height: 42px;
  border-radius: 10px;
  border: 1px solid #c7d8f0;
  padding: 8px 12px;
  font-size: 14px;
  outline: none;
}

/* تنسيق الأرقام */
.violation-grid input[type="number"]{
  direction:ltr;
  text-align:center;
  background:#eef8ff;
  font-weight:800;
}

/* الأزرار */
.violation-grid .actions{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top: 4px;
}

.violation-grid .actions button{
  border:0;
  border-radius:10px;
  padding:10px 16px;
  font-size:14px;
  cursor:pointer;
  color:#fff;
  font-weight:800;
}

.violation-grid .save{ background:#0b8c4a; }
.violation-grid .cancel{ background:#6c757d; display:none; }

/* موبايل */
@media (max-width: 800px){
  .violation-grid{
    grid-template-columns: 1fr; /* عمود واحد */
  }
}
/* ===== فلترة التاريخ ===== */

  max-width:1100px;
  margin: 10px auto 20px;

  align-items:flex-end;
  gap:16px;
  background:#f5f9ff;
  padding:12px 16px;
  border-radius:12px;

}

.filter-item{

<script>
/* ========= CONFIG ========= */
const SHEET_API = "https://script.google.com/macros/s/AKfycbw9Ex3cLo8VeLRulH-ozRfTF-9LAnOvdSs1tGN52R3QE2H-oclRPtBAfV-mrkAznuCbYw/exec";

const $ = (id) => document.getElementById(id);

let rowsData = [];
let editRowIndex = null;

/* ========= HELPERS ========= */
function showMessage(text, type = "success") {
  const box = $("messageBox");
  if (!box) {
    alert(text);
    return;
  }
  box.textContent = text;
  box.style.display = "block";
  box.style.backgroundColor = (type === "error") ? "#dc3545" : "#28a745";
  setTimeout(() => box.style.display = "none", 3000);
}

function normalizeDate(d) {
  if (!d) return "";

  if (typeof d === "string") {
    const s = d.trim();

    if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
    if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0, 10);

    const dt = new Date(s);
    if (!isNaN(dt.getTime())) {
      const y = dt.getFullYear();
      const m = String(dt.getMonth() + 1).padStart(2, "0");
      const day = String(dt.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }
    return "";
  }

  if (Object.prototype.toString.call(d) === "[object Date]") {
    if (isNaN(d.getTime())) return "";
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
  }

  return "";
}

function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, (c) => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#39;"
  }[c]));
}

function getQuarterDates(year, quarter) {
  let fromDate = "";
  let toDate = "";

  if (quarter === "1") {
    fromDate = `${year}-01-01`;
    toDate = `${year}-03-31`;
  } else if (quarter === "2") {
    fromDate = `${year}-04-01`;
    toDate = `${year}-06-30`;
  } else if (quarter === "3") {
    fromDate = `${year}-07-01`;
    toDate = `${year}-09-30`;
  } else if (quarter === "4") {
    fromDate = `${year}-10-01`;
    toDate = `${year}-12-31`;
  }

  return { fromDate, toDate };
}

function getQuarterLabel(q) {
  if (q === "1") return "الربع الأول";
  if (q === "2") return "الربع الثاني";
  if (q === "3") return "الربع الثالث";
  if (q === "4") return "الربع الرابع";
  return "";
}

function updateTitleText(from, to, year = "", quarter = "") {
  const el = $("dateRangeTitle");
  if (!el) return;

  if (from && to && year && quarter) {
    el.textContent = ` - ${getQuarterLabel(quarter)} ${year} (${from} إلى ${to})`;
  } else if (from && to) {
    el.textContent = ` - للفترة من ${from} إلى ${to}`;
  } else {
    el.textContent = "";
  }
}

function loadYears() {
  const reportYear = document.getElementById("reportYear");
  const filterYear = document.getElementById("filterYear");

  const startYear = 2000;
  const endYear = 2100;

  if (reportYear) {
    reportYear.innerHTML = '<option value="" disabled selected>اختر السنة</option>';
    for (let year = endYear; year >= startYear; year--) {
      const opt = document.createElement("option");
      opt.value = year;
      opt.textContent = year;
      reportYear.appendChild(opt);
    }
  }

  if (filterYear) {
    filterYear.innerHTML = '<option value="">كل السنوات</option>';
    for (let year = endYear; year >= startYear; year--) {
      const opt = document.createElement("option");
      opt.value = year;
      opt.textContent = year;
      filterYear.appendChild(opt);
    }
  }
}

function updateQuarterDates() {
  const year = $("reportYear")?.value || "";
  const quarter = $("reportQuarter")?.value || "";

  if (!year || !quarter) return;

  const { fromDate, toDate } = getQuarterDates(year, quarter);

  if ($("dateFrom")) $("dateFrom").value = fromDate;
  if ($("dateTo")) $("dateTo").value = toDate;

  updateTitleText(fromDate, toDate, year, quarter);
}

function getQuarterLabel(q) {
  const map = {
    "1": "الربع الأول (يناير - مارس)",
    "2": "الربع الثاني (أبريل - يونيو)",
    "3": "الربع الثالث (يوليو - سبتمبر)",
    "4": "الربع الرابع (أكتوبر - ديسمبر)"
  };
  return map[String(q)] || q;
}

function renderRows(data) {

  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  const groups = {};

  data.forEach(r => {
    const key = `${r.Year}_${r.Quarter}`;
    if (!groups[key]) groups[key] = [];
    groups[key].push(r);
  });

  let serial = 1;

  Object.keys(groups).forEach(key => {

    const group = groups[key];
    const year = group[0].Year;
    const quarter = group[0].Quarter;

    /* عنوان الربع */
    const titleRow = document.createElement("tr");
    titleRow.className = "quarter-title";

    titleRow.innerHTML = `
      <td colspan="6">
        ${getQuarterLabel(quarter)} - ${year}
      </td>
    `;

    tbody.appendChild(titleRow);

    group.forEach(r => {

      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${serial++}</td>
        <td>${r.Year}</td>
        <td>${getQuarterLabel(r.Quarter)}</td>
        <td>${r.Topic}</td>
        <td>${r.Count}</td>
       <td>
  <button class="btn-edit" type="button"
    onclick='startEdit(${JSON.stringify(String(r.Year || ""))}, ${JSON.stringify(String(r.Quarter || ""))}, ${JSON.stringify(String(r.Topic || ""))})'>
    تعديل
  </button>

  <button class="btn-delete" type="button"
    onclick='deleteRow(${JSON.stringify(String(r.Year || ""))}, ${JSON.stringify(String(r.Quarter || ""))}, ${JSON.stringify(String(r.Topic || ""))})'>
    حذف
  </button>
</td>
      `;

      tbody.appendChild(tr);

    });

  });

}

async function loadData() {
  try {
    const res = await fetch(`${SHEET_API}?action=list`);
    const json = await res.json();

    if (!json.ok) {
      showMessage("فشل تحميل البيانات", "error");
      return;
    }

    rowsData = json.rows || [];
    renderRows(rowsData);

  } catch (error) {
    console.error("خطأ في تحميل البيانات:", error);
    showMessage("حدث خطأ أثناء الاتصال بالخادم", "error");
  }
}

/* ========= حفظ / تعديل ========= */
async function saveOrUpdate(e) {
  e.preventDefault();

  const year = $("reportYear")?.value || "";
  const quarter = $("reportQuarter")?.value || "";
  const topic = $("statementType")?.value || "";
  const count = $("totalCount")?.value || 0;

  if (!year || !quarter || !topic) {
    showMessage("يرجى اختيار السنة والربع والبيان", "error");
    return;
  }

  const payload = new URLSearchParams({
    action: editRowIndex ? "update" : "add",
    year: year,
    quarter: quarter,
    topic: topic,
    count: count,
    oldYear: editRowIndex?.Year || "",
    oldQuarter: editRowIndex?.Quarter || "",
    oldTopic: editRowIndex?.Topic || ""
  });

  try {
    const res = await fetch(SHEET_API, {
      method: "POST",
      body: payload
    });

    const json = await res.json();

    if (!json.ok) {
      showMessage(json.msg || "فشل الحفظ", "error");
      return;
    }

    showMessage(editRowIndex ? "تم التعديل بنجاح" : "تم الحفظ بنجاح");

    editRowIndex = null;

    if ($("cancelEdit")) $("cancelEdit").style.display = "none";
    if ($("lastStatic")) $("lastStatic").reset();
    if ($("totalCount")) $("totalCount").value = 0;
    if ($("dateRangeTitle")) $("dateRangeTitle").textContent = "";

    loadYears();
    loadData();

  } catch (error) {
    console.error(error);
    showMessage("حدث خطأ أثناء الحفظ", "error");
  }
}

/* ========= تعديل ========= */
window.startEdit = function (year, quarter, topic) {
  const r = rowsData.find(x =>
    String(x.Year || "") === String(year) &&
    String(x.Quarter || "") === String(quarter) &&
    String(x.Topic || "") === String(topic)
  );

  if (!r) {
    showMessage("لم يتم العثور على السجل", "error");
    return;
  }

  editRowIndex = {
    Year: r.Year,
    Quarter: r.Quarter,
    Topic: r.Topic
  };

  const rowYear = String(r.Year || "");
  const rowQuarter = String(r.Quarter || "");
  const rowTopic = r.Topic || "";
  const rowCount = r.Count || 0;

  if ($("reportYear")) $("reportYear").value = rowYear;
  if ($("reportQuarter")) $("reportQuarter").value = rowQuarter;
  if ($("statementType")) $("statementType").value = rowTopic;
  if ($("totalCount")) $("totalCount").value = rowCount;

  updateQuarterDates();

  if ($("cancelEdit")) $("cancelEdit").style.display = "inline-block";
  window.scrollTo({ top: 0, behavior: "smooth" });
};

function cancelEditForm() {
  editRowIndex = null;
  if ($("cancelEdit")) $("cancelEdit").style.display = "none";
  if ($("lastStatic")) $("lastStatic").reset();
  if ($("totalCount")) $("totalCount").value = 0;
  if ($("dateRangeTitle")) $("dateRangeTitle").textContent = "";
}
/* ========= فلترة حسب السنة والربع ========= */
function applyQuarterFilter() {
  const year = $("filterYear")?.value || "";
  const fromQuarter = $("fromQuarter")?.value || "";
  const toQuarter = $("toQuarter")?.value || "";

  let filtered = [...rowsData];

  if (year) {
    filtered = filtered.filter(r => String(r.Year || "") === String(year));
  }

  if (fromQuarter && toQuarter && Number(fromQuarter) > Number(toQuarter)) {
    showMessage("من الربع يجب أن يكون أصغر من أو يساوي إلى الربع", "error");
    return;
  }

  if (fromQuarter) {
    filtered = filtered.filter(r => Number(r.Quarter || 0) >= Number(fromQuarter));
  }

  if (toQuarter) {
    filtered = filtered.filter(r => Number(r.Quarter || 0) <= Number(toQuarter));
  }

  renderRows(filtered);

  if ($("dateRangeTitle")) {
    if (year && fromQuarter && toQuarter) {
      $("dateRangeTitle").textContent =
        ` - ${year} - من ${getQuarterLabel(fromQuarter)} إلى ${getQuarterLabel(toQuarter)}`;
    } else if (year && fromQuarter) {
      $("dateRangeTitle").textContent =
        ` - ${year} - من ${getQuarterLabel(fromQuarter)}`;
    } else if (year && toQuarter) {
      $("dateRangeTitle").textContent =
        ` - ${year} - إلى ${getQuarterLabel(toQuarter)}`;
    } else if (year) {
      $("dateRangeTitle").textContent = ` - ${year}`;
    } else {
      $("dateRangeTitle").textContent = "";
    }
  }
}

function clearQuarterFilter() {
  if ($("filterYear")) $("filterYear").value = "";
  if ($("fromQuarter")) $("fromQuarter").value = "";
  if ($("toQuarter")) $("toQuarter").value = "";

  renderRows(rowsData);

  if ($("dateRangeTitle")) {
    $("dateRangeTitle").textContent = "";
  }
}

/* ========= بحث ========= */
function applySearch(q) {
  q = q.toLowerCase().trim();

  const filtered = rowsData.filter(r =>
    String(r.Topic || "").toLowerCase().includes(q) ||
    String(r.Count || "").toLowerCase().includes(q) ||
    String(r.Year || "").toLowerCase().includes(q) ||
    String(r.Quarter || "").toLowerCase().includes(q)
  );

  renderRows(filtered);
}

/* ========= تصدير Excel ========= */
function exportToExcel() {
  const table = $("lastStaticTable");
  if (!table) return;

  const wb = XLSX.utils.table_to_book(table, { sheet: "الإجراء المتخذ" });
  XLSX.writeFile(wb, "الإجراء_المتخذ.xlsx");
}

/* ========= حذف ========= */
/* هذه الدالة تحتاج أن يكون الـ Apps Script عندك يدعم action=delete */
window.deleteRow = async function (year, quarter, topic) {
  if (!confirm("هل تريد حذف السجل؟")) return;

  try {
    const payload = new URLSearchParams({
      action: "delete",
      year: year,
      quarter: quarter,
      topic: topic
    });

    const res = await fetch(SHEET_API, {
      method: "POST",
      body: payload
    });

    const json = await res.json();

    if (!json.ok) {
      showMessage(json.msg || "فشل الحذف", "error");
      return;
    }

    showMessage("تم حذف السجل بنجاح");
    loadData();

  } catch (error) {
    console.error(error);
    showMessage("حدث خطأ أثناء الحذف", "error");
  }
};

/* ========= EVENTS ========= */
document.addEventListener("DOMContentLoaded", () => {
  loadYears();

  if ($("lastStatic")) {
    $("lastStatic").addEventListener("submit", saveOrUpdate);
  }

  if ($("cancelEdit")) {
    $("cancelEdit").addEventListener("click", cancelEditForm);
  }

  if ($("reportYear")) {
    $("reportYear").addEventListener("change", updateQuarterDates);
  }

  if ($("reportQuarter")) {
    $("reportQuarter").addEventListener("change", updateQuarterDates);
  }

  if ($("filterBtn")) {
    $("filterBtn").addEventListener("click", applyQuarterFilter);
  }

  if ($("clearFilterBtn")) {
    $("clearFilterBtn").addEventListener("click", clearQuarterFilter);
  }

  if ($("searchInput")) {
    $("searchInput").addEventListener("input", (e) => {
      const q = e.target.value.trim();
      if (!q) {
        renderRows(rowsData);
        return;
      }
      applySearch(q);
    });
  }

  loadData();
});
</script>
