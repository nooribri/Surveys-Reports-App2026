<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>تقرير قسم الشكاوي</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap');
    *{box-sizing:border-box}
    body{font-family:'Cairo',sans-serif;margin:0;padding:16px;background:#fff}

    .main-header{max-width:1100px;margin:0 auto 16px;padding:14px 18px;border:1px solid #e0e0e0;border-radius:12px;box-shadow:0 3px 12px rgba(0,0,0,.05);position:relative}
    .header-top{display:flex;justify-content:center;gap:20px;position:relative;min-height:90px}
    .logo-box img{width:92px;height:auto}
    .gov-info{position:absolute;right:0;text-align:right;color:#0a66c2;font-weight:700;line-height:1.2}
    .gov-info h2,.gov-info h3,.gov-info h4{margin:0;padding:2px 0}
    .main-title{text-align:center;margin-top:6px;color:#0a66c2}
    .main-title p{margin:0;font-size:18px;font-weight:800}

    #messageBox{position:fixed;top:18px;right:18px;color:#fff;padding:8px 12px;border-radius:10px;font-size:13px;display:none;z-index:9999;box-shadow:0 0 10px rgba(0,0,0,0.2)}

    form{max-width:1100px;margin:0 auto 12px;background:#f3f8ff;border-radius:12px;padding:14px 16px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
    .grid{display:grid;grid-template-columns:260px 1fr 260px 1fr;gap:10px;align-items:center}
    label{font-weight:800;color:#0a3d73}
    input{width:100%;height:38px;border-radius:10px;border:1px solid #c7d8f0;padding:8px 10px;font-size:14px;outline:none}
    input[type="number"]{direction:ltr;text-align:center;background:#eef8ff;font-weight:800}

    .actions{grid-column:1/-1;display:flex;justify-content:center;gap:10px;margin-top:6px}
    .actions button{border:0;border-radius:10px;padding:9px 14px;font-size:14px;cursor:pointer;color:#fff;font-weight:800}
    .save{background:#0b8c4a}
    .cancel{background:#6c757d;display:none}

    .tools{max-width:1100px;margin:0 auto 10px;display:flex;justify-content:center}
    .tools input{min-width:320px;padding:9px 10px;border-radius:10px;border:1px solid #ccc}

    table{width:100%;max-width:1100px;margin:0 auto;border-collapse:collapse;box-shadow:0 2px 8px rgba(0,0,0,0.08);background:#fff}
    th,td{border:1px solid #d0d7e2;padding:8px 6px;text-align:center;font-size:13px}
    th{background:#0b5ed7;color:#fff}
    tbody tr:nth-child(even){background:#f9fbff}
    .action-col{white-space:nowrap}

    .action-btn{border:0;border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer;color:#fff;font-weight:800}
    .edit-btn{background:#17a2b8}
    .delete-btn{background:#dc3545}

    .export-buttons{max-width:1100px;margin:16px auto 0;display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
    .export-buttons button{padding:10px 14px;border:0;border-radius:10px;background:#6f42c1;color:#fff;cursor:pointer;font-size:14px;font-weight:800}
    .export-buttons i{margin-left:6px}

    /* ===== التوقيعات ===== */
    .signatures-line {
      max-width: 1100px;
      margin: 30px auto 10px;
      display: flex;
      gap: 30px;
      align-items: center;
    }
    .sig-item { display:flex; align-items:center; gap:10px; flex:1; }
    .sig-item.wide { flex:2; }
    .sig-title { font-weight:700; color:#0a3d73; white-space:nowrap; font-size:15px; }
    .sig-input {
      flex: 1;
      border: none;
      border-bottom: 2px solid #000;
      background: transparent;
      outline: none;
      font-size: 15px;
      padding: 4px 2px;
      font-family: 'Cairo', sans-serif;
    }

    .row-highlight{ outline:3px solid #38bdf8; outline-offset:-3px; }

    @media print{
      form,.tools,.export-buttons,#messageBox{display:none !important}
      th.action-col, td.action-col{display:none !important}
      body{padding:0;margin:0}
      table{box-shadow:none}
      .sig-input{border-bottom:none !important}
      .sig-input::placeholder{color:transparent}
    }

    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .gov-info{position:static;margin-top:8px}
      .header-top{flex-direction:column;align-items:center}
      .signatures-line{flex-direction:column;align-items:stretch}
      .sig-item, .sig-item.wide{flex:1}
    }

    /* شبكة مخصصة لتقرير الشؤون الإدارية */
.violation-grid{
  display:grid;
  grid-template-columns: 1fr 1fr;  /* عمودين */
  gap: 12px 16px;
  align-items:end;
}

/* كل حقل */
.violation-grid .field{
  display:flex;
  flex-direction:column;
  gap:6px;
}

/* عناصر بعرض كامل */
.violation-grid .full{
  grid-column: 1 / -1;
}

/* تنسيق الليبل */
.violation-grid label{
  font-weight: 800;
  color: #0a3d73;
  font-size: 15px;
}

/* تنسيق الحقول */
.violation-grid select,
.violation-grid input{
  height: 42px;
  border-radius: 10px;
  border: 1px solid #c7d8f0;
  padding: 8px 12px;
  font-size: 14px;
  outline: none;
}

/* تنسيق الأرقام */
.violation-grid input[type="number"]{
  direction:ltr;
  text-align:center;
  background:#eef8ff;
  font-weight:800;
}

/* الأزرار */
.violation-grid .actions{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top: 4px;
}

.violation-grid .actions button{
  border:0;
  border-radius:10px;
  padding:10px 16px;
  font-size:14px;
  cursor:pointer;
  color:#fff;
  font-weight:800;
}

.violation-grid .save{ background:#0b8c4a; }
.violation-grid .cancel{ background:#6c757d; display:none; }

/* موبايل */
@media (max-width: 800px){
  .violation-grid{
    grid-template-columns: 1fr; /* عمود واحد */
  }
}
/* ===== فلترة التاريخ ===== */
.filters{
  max-width:1100px;
  margin: 10px auto 20px;
  display:flex;
  align-items:flex-end;
  gap:16px;
  background:#f5f9ff;
  padding:12px 16px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.06);
}

.filter-item{
  display:flex;
  flex-direction:column;
  gap:4px;
}

.filter-item label{
  font-size:13px;
  font-weight:700;
  color:#0a3d73;
}

.filter-item input[type="date"]{
  width:160px;           /* 🔹 تصغير الحقل */
  height:34px;
  font-size:13px;
  border-radius:8px;
  border:1px solid #c7d8f0;
  padding:4px 8px;
}

#filterBtn{
  height:34px;
  padding:0 14px;
  border:0;
  border-radius:8px;
  background:#0b5ed7;
  color:#fff;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
}

#filterBtn:hover{
  background:#0949a6;
}

/* 📱 للجوال */
@media (max-width:600px){
  .filters{
    flex-direction:column;
    align-items:stretch;
  }
  .filter-item input[type="date"]{
    width:100%;
  }
}

@media print {

<script>
/* ========= CONFIG ========= */
const SHEET_API= "https://script.google.com/macros/s/AKfycbwLfWIb9sfS0krYUn3xCzrVAcNv1STD_V8y0-xseq6l1qp8gX9M7HPgw3DVAkVAGulz/exec";

function $(id){
  return document.getElementById(id);
}

let rowsData = [];
let editRowIndex = null;
let pendingScrollRow = null;

/* ========= HELPERS ========= */
function showMessage(text, type="success"){
  const box = $("messageBox");
  if(!box) return;
  box.textContent = text;
  box.style.display = "block";
  box.style.backgroundColor = (type==="error") ? "#dc3545" : "#28a745";
  setTimeout(()=> box.style.display="none", 3000);
}

function scrollToRow(rowIndex){
  const rowEl = document.querySelector(`tr[data-rowindex="${rowIndex}"]`);
  if(!rowEl) return;
  rowEl.scrollIntoView({ behavior:"smooth", block:"center" });
  rowEl.classList.add("row-highlight");
  setTimeout(()=> rowEl.classList.remove("row-highlight"), 1500);
}

/* ========= مساعدات ========= */
function normalizeDate(d){
  if(!d) return "";

  // إذا جاء من input type="date" فهو جاهز
  if (typeof d === "string") {
    const s = d.trim();
    if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;

    // ISO أو نص طويل -> خذي أول 10 أحرف لو كانت YYYY-MM-DD
    if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);

    // محاولة تحويل عام
    const dt = new Date(s);
    if (!isNaN(dt.getTime())) {
      const y = dt.getFullYear();
      const m = String(dt.getMonth()+1).padStart(2,"0");
      const day = String(dt.getDate()).padStart(2,"0");
      return `${y}-${m}-${day}`;
    }
    return "";
  }

  // لو جاء Date object
  if (Object.prototype.toString.call(d) === "[object Date]") {
    if (isNaN(d.getTime())) return "";
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,"0");
    const day = String(d.getDate()).padStart(2,"0");
    return `${y}-${m}-${day}`;
  }

  return "";
}
// تحويل الأرقام العربية/الهندية إلى إنجليزية
function toEnglishDigits(str){
  return String(str ?? "")
    .replace(/[٠-٩]/g, d => "0123456789"["٠١٢٣٤٥٦٧٨٩".indexOf(d)])
    .replace(/[۰-۹]/g, d => "0123456789"["۰۱۲۳۴۵۶۷۸۹".indexOf(d)]);
}

// حماية نصوص الجدول
function escapeHtml(s){
  return String(s ?? "").replace(/[&<>"']/g, (c) => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[c]));
}

// تنظيف رقم القيمة (لو المستخدم كتب فواصل/نص)
function num_(v){
  const s = String(v ?? "").replace(/,/g,"").replace(/[^\d.]/g,"");
  const n = Number(s);
  return isNaN(n) ? 0 : n;
}

function showMessage(msg){ alert(msg); }


function updateTitleText(from,to){
  const el = $("subSectorTitleYear");
  if(!el) return;

  if(from || to){
    el.textContent = ` من ${from || "..."} إلى ${to || "..."}`;
  }else{
    el.textContent = ` ${new Date().getFullYear()}`;
  }
}

function formatDateWithoutTimezone(dateString) {
  if (!dateString) return "";
  return dateString.split("T")[0]; 
}

function toggleOtherSector() {
  const select = document.getElementById("sectorType");
  const otherField = document.getElementById("otherSectorField");

  if (!select || !otherField) return;

  if (select.value === "أخرى") {
    otherField.style.display = "block";
    document.getElementById("otherSectorInput").setAttribute("required", "required");
  } else {
    otherField.style.display = "none";
    document.getElementById("otherSectorInput").removeAttribute("required");
  }
}

document.addEventListener("DOMContentLoaded", function(){
  toggleOtherSector();
});

/* ========= عرض البيانات ========= */
function renderRows(data){
  const tbody = $("tbody");
  tbody.innerHTML = "";

  let total = 0;

  data.forEach((r, i) => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${i + 1}</td>
      <td>${normalizeDate(r.Date)}</td>
      <td>${r.Sector || ""}</td>
      <td>${r.Count ?? 0}</td>
      <td class="action-col">
        <button type="button" class="btn-edit" onclick="startEdit(${i})">تعديل</button>
        <button type="button" class="btn-delete" onclick="deleteRow(${r.rowId})">حذف</button>
      </td>
    `;
    tbody.appendChild(tr);
    total += Number(r.Count ?? 0);
  });

  $("sumCount").textContent = total;
}

window.startEdit = function(index){
  const r = rowsData[index];

  if(!r){
    showMessage("فشل: لم يتم العثور على الصف");
    return;
  }

  editRowIndex = r.rowId;
  $("vDate").value = normalizeDate(r.Date);
  $("sectorType").value = r.Sector || "";
  $("count").value = r.Count ?? "";
  $("cancelEdit").style.display = "inline-block";

  window.scrollTo({ top: 0, behavior: "smooth" });
};

window.deleteRow = async function(rowId){
  if(!confirm("هل تريد حذف السطر؟")) return;

  const payload = new URLSearchParams({
    action: "delete",
    rowId: rowId
  });

  const res = await fetch(SHEET_API, {
    method: "POST",
    body: payload
  });

  const json = await res.json();

  if(!json.ok){
    showMessage(json.msg || "فشل الحذف");
    return;
  }

  showMessage("تم الحذف ✅");
  loadData();
};

async function loadData(){
  const res = await fetch(`${SHEET_API}?action=list`);
  const json = await res.json();

  if(!json.ok){
    showMessage("فشل تحميل البيانات");
    return;
  }

  rowsData = json.rows || [];
  renderRows(rowsData);
}

async function saveOrUpdate(e){
  e.preventDefault();

  const date = normalizeDate($("vDate").value);
  let sector = $("sectorType").value;
  const count = $("count").value || 0;

  if (sector === "أخرى") {
    sector = $("otherSectorInput").value.trim();
  }

  if(!date || !sector){
    showMessage("يرجى تعبئة الحقول المطلوبة");
    return;
  }

  const payload = new URLSearchParams({
    action: editRowIndex ? "update" : "add",
    rowId: editRowIndex || "",
    date: date,
    sector: sector,
    count: count
  });

  const res = await fetch(SHEET_API, {
    method: "POST",
    body: payload
  });

  const json = await res.json();

  if(!json.ok){
    showMessage(json.msg || "فشل الحفظ");
    return;
  }

  showMessage(editRowIndex ? "تم التعديل ✅" : "تم الحفظ ✅");

  editRowIndex = null;
  $("cancelEdit").style.display = "none";
  $("subSectorForm").reset();
  $("count").value = 0;

  loadData();
}

document.addEventListener("DOMContentLoaded", function(){
  const form = $("subSectorForm");
  const cancelBtn = $("cancelEdit");

  if(form){
    form.addEventListener("submit", saveOrUpdate);
  }

  if(cancelBtn){
    cancelBtn.addEventListener("click", function(){
      editRowIndex = null;
      $("subSectorForm").reset();
      $("count").value = 0;
      this.style.display = "none";
    });
  }

  loadData();
});
/* ========= فلترة ========= */
function applyDateFilter(){
  const from = normalizeDate($("fromDate").value);
  const to = normalizeDate($("toDate").value);

  let filtered = rowsData;

  if(from){
    filtered = filtered.filter(r => normalizeDate(r.Date) >= from);
  }

  if(to){
    filtered = filtered.filter(r => normalizeDate(r.Date) <= to);
  }

  renderRows(filtered);
  updateTitleText(from,to);
}

function clearDateFilter(){
  $("fromDate").value="";
  $("toDate").value="";
  renderRows(rowsData);
  updateTitleText("","");
}

/* ========= بحث ========= */
function applySearch(q){
  q = q.toLowerCase();
  const filtered = rowsData.filter(r =>
    String(r.Date).toLowerCase().includes(q) ||
    String(r.Sector).toLowerCase().includes(q) ||
    String(r.Count).toLowerCase().includes(q)
  );
  renderRows(filtered);
}

/* ========= تصدير Excel ========= */
function exportToExcel(){
  const wb = XLSX.utils.table_to_book(document.getElementById("subSectorTable"), { sheet:"القطاعات الفرعية" });
  XLSX.writeFile(wb, "القطاعات الفرعية.xlsx");
}

/* ========= EVENTS ========= */
document.addEventListener("DOMContentLoaded",()=>{
  $("subSectorForm").addEventListener("submit",saveOrUpdate);
  $("cancelEdit").addEventListener("click",()=>{
    editRowIndex=null;
    $("cancelEdit").style.display="none";
    $("subSectorForm").reset();
    $("count").value=0;
  });
  

  const filterBtn = $("filterBtn");
  if(filterBtn) filterBtn.addEventListener("click", applyDateFilter);

  const clearBtn = $("clearFilterBtn");
  if(clearBtn) clearBtn.addEventListener("click", clearDateFilter);

  const searchInput = $("searchInput");
  if(searchInput) searchInput.addEventListener("input", (e)=>{
    const q = e.target.value.trim();
    if(!q) return renderRows(rowsData);
    applySearch(q);
  });

  updateTitleText("","");
  loadData();
});

</script>
</body>
