  <!-- السكريبت -->
  <script>
    const SHEET_API = "https://script.google.com/macros/s/AKfycbxHFzUgpMF9gTlaUQM2NgHT7tfLA6MXisTcOyHckm5IOEkm9FLjbQ8mWj_OzLXIw5k/exec"; // رابط Google Apps Script Web App
    let goodsData = [];
    let editRowNumber = null;

    function scrollToRow(rowIndex){
  const rowEl = document.querySelector(`tr[data-rowindex="${rowIndex}"]`);
  if(!rowEl) return;
  rowEl.scrollIntoView({ behavior:"smooth", block:"center" });
  rowEl.classList.add("row-highlight");
  setTimeout(()=> rowEl.classList.remove("row-highlight"), 1500);
}

/* ========= مساعدات ========= */
function normalizeDate(d){
  if(!d) return "";

  // إذا جاء من input type="date" فهو جاهز
  if (typeof d === "string") {
    const s = d.trim();
    if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;

    // ISO أو نص طويل -> خذي أول 10 أحرف لو كانت YYYY-MM-DD
    if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);

    // محاولة تحويل عام
    const dt = new Date(s);
    if (!isNaN(dt.getTime())) {
      const y = dt.getFullYear();
      const m = String(dt.getMonth()+1).padStart(2,"0");
      const day = String(dt.getDate()).padStart(2,"0");
      return `${y}-${m}-${day}`;
    }
    return "";
  }

  // لو جاء Date object
  if (Object.prototype.toString.call(d) === "[object Date]") {
    if (isNaN(d.getTime())) return "";
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,"0");
    const day = String(d.getDate()).padStart(2,"0");
    return `${y}-${m}-${day}`;
  }

  return "";
}
// تحويل الأرقام العربية/الهندية إلى إنجليزية
function toEnglishDigits(str){
  return String(str ?? "")
    .replace(/[٠-٩]/g, d => "0123456789"["٠١٢٣٤٥٦٧٨٩".indexOf(d)])
    .replace(/[۰-۹]/g, d => "0123456789"["۰۱۲۳۴۵۶۷۸۹".indexOf(d)]);
}

// حماية نصوص الجدول
function escapeHtml(s){
  return String(s ?? "").replace(/[&<>"']/g, (c) => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[c]));
}

// تنظيف رقم القيمة (لو المستخدم كتب فواصل/نص)
function num_(v){
  const s = String(v ?? "").replace(/,/g,"").replace(/[^\d.]/g,"");
  const n = Number(s);
  return isNaN(n) ? 0 : n;
}

function showMessage(msg){ alert(msg); }


function updateTitleText(from,to){
  const el = $("goodsFormTitleYear");
  if(!el) return;

  if(from || to){
    el.textContent = ` من ${from || "..."} إلى ${to || "..."}`;
  }else{
    el.textContent = ` ${new Date().getFullYear()}`;
  }
}

function formatDateWithoutTimezone(dateString) {
  if (!dateString) return "";
  return dateString.split("T")[0]; 
}
function toggleOtherSector() {
  const select = document.getElementById("sectorType");
  const otherField = document.getElementById("otherSectorField");

  if (!select || !otherField) return;

  if (select.value === "أخرى") {
    otherField.style.display = "block";
    document.getElementById("otherSectorInput").setAttribute("required", "required");
  } else {
    otherField.style.display = "none";
    document.getElementById("otherSectorInput").removeAttribute("required");
  }
}

document.addEventListener("DOMContentLoaded", function(){
  toggleOtherSector();
});




    document.addEventListener("DOMContentLoaded", () => {
      const goodsForm = document.getElementById("goodsForm");
      const date = document.getElementById("date");
      const item = document.getElementById("item");
      const barcode = document.getElementById("barcode");
      const weight = document.getElementById("weight");
      const source = document.getElementById("source");
      const price = document.getElementById("price");
      const notes = document.getElementById("notes");

      loadData();

      // حفظ / تحديث البيانات
      goodsForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const data = {
          action: editRowNumber ? "update" : "add",
          rowNumber: editRowNumber || "",
          date: date.value,
          item: item.value,
          barcode: barcode.value,
          weight: weight.value,
          source: source.value,
          price: price.value,
          notes: notes.value
        };
        try {
          const res = await fetch(SHEET_API, {
            method: "POST",
            body: new URLSearchParams(data)
          });
          if (res.ok) {
            goodsForm.reset();
            editRowNumber = null;
            await loadData();
            showMessage("تم الحفظ بنجاح");
           
          } else {
            showMessage("فشل الحفظ", "error");
          }
        } catch (err) {
          console.error(err);
          showMessage("فشل الاتصال بالخادم", "error");
        }
      });

      // البحث
      document.getElementById("searchInput").addEventListener("input", searchTable);

      // تعديل صف
      window.startEdit = function(index) {
        const row = goodsData[index];
        editRowNumber = row.rowNumber;
        Object.keys(row).forEach(key => {
          const input = document.getElementById(key);
          if (input) input.value = row[key];
        });
        window.scrollTo({ top: 0, behavior: "smooth" });
      };

      // حذف صف
      window.deleteRow = async function(index) {
        if (!confirm("هل تريد الحذف؟")) return;
        const row = goodsData[index];
        try {
          const res = await fetch(SHEET_API, {
            method: "POST",
            body: new URLSearchParams({ action: "delete", rowNumber: row.rowNumber })
          });
          if (res.ok) {
            showMessage("تم الحذف بنجاح");
            await loadData();
          } else {
            showMessage("خطأ أثناء الحذف", "error");
          }
        } catch (err) {
          console.error(err);
          showMessage("فشل الاتصال بالخادم", "error");
        }
      };
    });

    // تحميل البيانات
    async function loadData() {
      try {
        const res = await fetch(SHEET_API);
        const data = await res.json();
        goodsData = data;
        renderTable(goodsData);
      } catch (err) {
        console.error(err);
        showMessage("فشل تحميل البيانات", "error");
      }
    }

    // رسم الجدول
   function renderTable(data) {
  const tbody = document.getElementById("goodsBody");
  tbody.innerHTML = "";

  data.forEach((row, i) => {
    tbody.innerHTML += `
      <tr>
        <td>${row.rowNumber - 1}</td>
        <td>${formatDate(row.date)}</td>
        <td>${row.item}</td>
        <td>${row.barcode}</td>
        <td>${row.weight}</td>
        <td>${row.source}</td>
        <td>${row.price}</td>
        <td>${row.notes}</td>
       <td class="actions-column">
  <button class="action-btn edit-btn"
    onclick="startEdit(${i})">
    تعديل
  </button>

  <button class="action-btn delete-btn"
    onclick="deleteRow(${i})">
    حذف
  </button>
</td>
      </tr>
    `;
  });
}


    // الرسائل
    function showMessage(msg, type="success") {
      const box = document.getElementById("messageBox");
      box.textContent = msg;
      box.style.background = type === "error" ? "#dc3545" : "#28a745";
      box.style.display = "block";
      setTimeout(() => box.style.display = "none", 3000);
    }

    // تنسيق التاريخ
    function formatDate(dateStr) {
  if (!dateStr) return "";
  const d = new Date(dateStr);
  return d.toLocaleDateString("en-CA");
}

    // البحث
    function searchTable() {
      const q = this.value.toLowerCase();
      const filtered = goodsData.filter(row =>
        Object.values(row).some(val =>
          String(val).toLowerCase().includes(q)
        )
      );
      renderTable(filtered);
    }

    /* ========== البحث + الفلترة بالتاريخ ========== */
   function getValue(id) {
  const el = document.getElementById(id);
  return el ? el.value.trim() : "";
}

function setValue(id, value) {
  const el = document.getElementById(id);
  if (el) el.value = value;
}

function fmtDate(value) {
  if (!value) return "";

  const d = new Date(value);
  if (isNaN(d.getTime())) return "";

  const year = d.getFullYear();
  const month = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");

  return `${year}-${month}-${day}`;
}

function fmtNum(n) {
  if (n === "" || n === null || n === undefined) return "";
  const x = Number(String(n).replace(/,/g, ""));
  return Number.isFinite(x) ? x.toLocaleString("ar") : n;
}

function applyFiltersAndRender() {
  const q = (document.getElementById("searchInput")?.value || "").toLowerCase().trim();
  const from = getValue("fromDate");
  const to = getValue("toDate");

  const filtered = goodsData.filter(row => {
    const matchText = !q || Object.values(row).some(v =>
      String(v ?? "").toLowerCase().includes(q)
    );

    // عدّل اسم الحقل هنا إذا كان اسم التاريخ مختلفاً
    const d = fmtDate(row.date);
    const matchFrom = !from || (d && d >= from);
    const matchTo = !to || (d && d <= to);

    return matchText && matchFrom && matchTo;
  });

  renderTable(filtered);
}

document.addEventListener("DOMContentLoaded", () => {
  const search = document.getElementById("searchInput");
  const filterBtn = document.getElementById("filterBtn");
  const clearBtn = document.getElementById("clearFilterBtn");

  if (search) search.addEventListener("input", applyFiltersAndRender);
  if (filterBtn) filterBtn.addEventListener("click", applyFiltersAndRender);

  if (clearBtn) {
    clearBtn.addEventListener("click", () => {
      setValue("fromDate", "");
      setValue("toDate", "");
      if (search) search.value = "";
      applyFiltersAndRender();
    });
  }
});
    // تصدير Excel
    function exportToExcel() {
      const table = document.getElementById("goodsTable");
      const wb = XLSX.utils.table_to_book(table, { sheet: "السلع الأساسية" });
      XLSX.writeFile(wb, "مسوحات_السلع_الأساسية.xlsx");
    }
  
</script>
