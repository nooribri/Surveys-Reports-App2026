<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>تقرير المسافة المقطوعة </title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap');
    *{box-sizing:border-box}
    body{font-family:'Cairo',sans-serif;margin:0;padding:16px;background:#fff}

    .main-header{max-width:1100px;margin:0 auto 16px;padding:14px 18px;border:1px solid #e0e0e0;border-radius:12px;box-shadow:0 3px 12px rgba(0,0,0,.05);position:relative}
    .header-top{display:flex;justify-content:center;gap:20px;position:relative;min-height:90px}
    .logo-box img{width:92px;height:auto}
    .gov-info{position:absolute;right:0;text-align:right;color:#0a66c2;font-weight:700;line-height:1.2}
    .gov-info h2,.gov-info h3,.gov-info h4{margin:0;padding:2px 0}
    .main-title{text-align:center;margin-top:6px;color:#0a66c2}
    .main-title p{margin:0;font-size:18px;font-weight:800}

    #messageBox{position:fixed;top:18px;right:18px;color:#fff;padding:8px 12px;border-radius:10px;font-size:13px;display:none;z-index:9999;box-shadow:0 0 10px rgba(0,0,0,0.2)}

    form{max-width:1100px;margin:0 auto 12px;background:#f3f8ff;border-radius:12px;padding:14px 16px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
    .grid{display:grid;grid-template-columns:260px 1fr 260px 1fr;gap:10px;align-items:center}
    label{font-weight:800;color:#0a3d73}
    input,select{width:100%;height:38px;border-radius:10px;border:1px solid #c7d8f0;padding:8px 10px;font-size:14px;outline:none}
    input[type="number"]{direction:ltr;text-align:center;background:#eef8ff;font-weight:800}

    .actions{grid-column:1/-1;display:flex;justify-content:center;gap:10px;margin-top:6px}
    .actions button{border:0;border-radius:10px;padding:9px 14px;font-size:14px;cursor:pointer;color:#fff;font-weight:800}
    .save{background:#0b8c4a}
    .cancel{background:#6c757d;display:none}

    .tools{max-width:1100px;margin:0 auto 10px;display:flex;justify-content:center}
    .tools input{min-width:320px;padding:9px 10px;border-radius:10px;border:1px solid #ccc}

    table{width:100%;max-width:1100px;margin:0 auto;border-collapse:collapse;box-shadow:0 2px 8px rgba(0,0,0,0.08);background:#fff}
    th,td{border:1px solid #d0d7e2;padding:6px 4px;text-align:center;font-size:13px}
    th{background:#0b5ed7;color:#fff}
    tbody tr:nth-child(even){background:#f9fbff}
    .action-col{white-space:nowrap}

    .action-btn{border:0;border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer;color:#fff;font-weight:800}
    .edit-btn{background:#17a2b8}
    .delete-btn{background:#dc3545}

    .export-buttons{max-width:1100px;margin:16px auto 0;display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
    .export-buttons button{padding:10px 14px;border:0;border-radius:10px;background:#6f42c1;color:#fff;cursor:pointer;font-size:14px;font-weight:800}
    .export-buttons i{margin-left:6px}

    @media print{
      form,.tools,.export-buttons,#messageBox{display:none !important}
      th.action-col, td.action-col{display:none !important}
      body{padding:0;margin:0}
      table{box-shadow:none}
    }

    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .gov-info{position:static;margin-top:8px}
      .header-top{flex-direction:column;align-items:center}
    }
    /* ===== التوقيعات ===== */
   /* ===== التوقيعات (إدخال عادي) ===== */
.signatures-line {
  max-width: 1100px;
  margin: 30px auto 10px;
  display: flex;
  gap: 30px;
  align-items: center;
}

.sig-item {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
}

.sig-item.wide {
  flex: 2;
}

.sig-title {
  font-weight: 700;
  color: #0a3d73;
  white-space: nowrap;
  font-size: 15px;
}

/* input يظهر كخط */
.sig-input {
  flex: 1;
  border: none;
  border-bottom: 2px solid #000;
  background: transparent;
  outline: none;
  font-size: 15px;
  padding: 4px 2px;
  font-family: 'Cairo', sans-serif;
}

/* ===== عند الطباعة ===== */
@media print {

  /* إزالة الخط */
  .sig-input {
    border-bottom: none !important;
    padding-bottom: 0;
  }

  /* إخفاء placeholder */
  .sig-input::placeholder {
    color: transparent;
  }

  /* منع التعديل أثناء الطباعة */
  .sig-input {
    pointer-events: none;
  }
}

.row-highlight{
  outline: 3px solid #38bdf8;
  outline-offset: -3px;
}

.report-title{
  max-width:1100px;
  margin: 10px auto 18px;
  text-align:center;
  color:#0a66c2;
  font-weight:800;
  font-size:20px;
}
.date-cell{
  direction:ltr;
  unicode-bidi:bidi-override;
  font-variant-numeric: lining-nums;
}

.filters{
  max-width:1100px;
  margin:10px auto 12px;
  display:flex;
  gap:10px;
  align-items:flex-end;
  flex-wrap:wrap;
  justify-content:center;
}
.filters .f-item{display:flex; flex-direction:column; gap:6px;}
.filters label{font-weight:700; color:#0a3d73; font-size:13px;}
.filters input[type="date"]{
  width:170px;
  height:34px;
  border-radius:10px;
  border:1px solid #c7d8f0;
  padding:6px 10px;
  font-size:13px;
}
.filters button{
  height:34px;
  border:0;
  border-radius:10px;
  padding:0 14px;
  cursor:pointer;
  color:#fff;
  background:#0d6efd;
  font-weight:800;
  font-size:13px;
}
.filters button.ghost{
  background:#6c757d;
}
@media print{
  #filtersBox{display:none !important;} /* إخفاء الفلترة عند الطباعة */
}

@media print {
  .back-button {
    display: none !important;
  }
}
  </style>
</head>

<body>

<header class="main-header">
  <div class="header-top">
    <div class="logo-box">
      <img src="image.png" alt="شعار سلطنة عمان">
    </div>
    <div class="gov-info">
      <h2>سلطنة عمان</h2>
      <h3>هيئة حماية المستهلك</h3>
      <h4>إدارة حماية المستهلك بمحافظة الظاهرة</h4>
      <h4>قسم الدراسات والتطوير</h4>
    </div>
  </div>
  <div class="main-title">
     <h4>قسم الشؤون الإدارية والمالية</h4>
    <p>تقرير المسافة المقطوعة </p>
  </div>
</header>
<h2 id="reportTitle" class="report-title"></h2>


<div id="messageBox"></div>

<h4>إجمالي المسافة المقطوعة لجميع أعمال الإدارة وهي كالأتي:-</h4>

<form id="distanceForm">
  <div class="grid">
  <label>التاريخ</label>
<input type="date" id="reportDate" required>


    <label>إجمالي المسافة المقطوعة (كم)</label>
    <input type="number" id="distanceKm" min="0" step="0.1" value="0">

  
    <div class="actions">
      <button type="submit" class="save"><i class="fa-solid fa-floppy-disk"></i> حفظ</button>
      <button type="button" class="cancel" id="cancelEdit">إلغاء التعديل</button>
    </div>
  </div>
</form>

<div class="tools">
  <input type="text" id="searchInput" placeholder="🔍 بحث في جميع الحقول">
</div>

<div class="filters" id="filtersBox">
  <div class="f-item">
    <label>من تاريخ</label>
    <input type="date" id="fromDate">
  </div>

  <div class="f-item">
    <label>إلى تاريخ</label>
    <input type="date" id="toDate">
  </div>

  <button type="button" id="filterBtn">تطبيق الفلترة</button>
  <button type="button" id="clearFilterBtn" class="ghost">مسح</button>
</div>


<table id="distanceTable">
  <thead>
    <tr>
      <th>م</th>
      <th>التاريخ</th>
      <th>إجمالي المسافةالمقطوعة لجميع أعمال الإدارة</th>
     
      <th class="action-col">إجراء</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
 <tfoot>
  <tr>
    <td colspan="2"><b>الإجمالي</b></td>
    <td id="sumDistance">0</td>
    <td class="action-col"></td>
  </tr>
</tfoot>

</table>

<!-- التوقيعات -->
<div class="signatures-line">
  <div class="sig-item">
    <label class="sig-title">أعد التقرير:</label>
    <input type="text" class="sig-input" placeholder="الاسم">
  </div>

  <div class="sig-item">
    <label class="sig-title">راجعه:</label>
    <input type="text" class="sig-input" placeholder="الاسم">
  </div>

  <div class="sig-item wide">
    <label class="sig-title">اعتماد رئيسة قسم الشؤون الإدارية والمالية:</label>
    <input type="text" class="sig-input" placeholder="الاسم">
  </div>
</div>



<div class="export-buttons">
  <button type="button" onclick="window.print()"><i class="fa-solid fa-print"></i> طباعة</button>
  <button type="button" onclick="exportToExcel()"><i class="fa-solid fa-file-excel"></i> Excel</button>
</div>


<a href="javascript:history.back()" class="back-button">الرجوع</a>

<script>
// 🔴 رابط Web App
const SHEET_API = "https://script.google.com/macros/s/AKfycbxyEGmuJOtmSYhV0ow14cJ8wsYWsbcvE4UWGfUE05mlO_iXM3nd32pLbjQbK6bsHQGsCQ/exec";

const $ = (id) => document.getElementById(id);

let rowsData = [];
let editRowIndex = null;
let pendingScrollRow = null;

/* ===================== Helpers ===================== */

function updateReportTitle(){
  const el = $("reportTitle");
  if(!el) return;

  const from = normalizeDate($("fromDate")?.value || "");
  const to   = normalizeDate($("toDate")?.value || "");
  const formDate = normalizeDate($("reportDate")?.value || "");

  // إذا فيه فلترة تاريخ
  if(from || to){
    el.textContent =
      `التقرير الإحصائي للفترة: ${toEnglishDigits(from || "…")} إلى ${toEnglishDigits(to || "…")}`;
    return;
  }

  // إذا فيه تاريخ في النموذج
  if(formDate){
    el.textContent =
      `التقرير الإحصائي لسنة ${toEnglishDigits(yearFromDate(formDate))}`;
    return;
  }

  // الافتراضي: السنة الحالية
  el.textContent =
    `التقرير الإحصائي لسنة ${toEnglishDigits(new Date().getFullYear())}`;
}

/* ===== تحويل الأرقام إلى إنجليزية ===== */
function toEnglishDigits(input){
  return String(input)
    .replace(/[٠-٩]/g, d => "٠١٢٣٤٥٦٧٨٩".indexOf(d))
    .replace(/[۰-۹]/g, d => "۰۱۲۳۴۵۶۷۸۹".indexOf(d));
}

/* ===== تنسيق التاريخ yyyy-mm-dd ===== */
function formatDateYYYYMMDD(v){
  if(!v) return "";

  const d = (v instanceof Date) ? v : new Date(v);
  if(isNaN(d.getTime())) return String(v);

  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");

  return `${y}-${m}-${day}`;
}

/* ===== استخراج السنة من التاريخ ===== */
function yearFromDate(v){
  const s = normalizeDate(v);
  return s ? s.slice(0, 4) : "";
}

/* ===== توحيد صيغة التاريخ ===== */
function normalizeDate(d){
  const s = String(d ?? "").trim();
  if(!s) return "";

  // yyyy-mm-dd
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;

  // dd-mm-yyyy أو d-m-yyyy
  const m = s.match(/^(\d{1,2})-(\d{1,2})-(\d{4})$/);
  if (m){
    const dd = m[1].padStart(2,"0");
    const mm = m[2].padStart(2,"0");
    const yyyy = m[3];
    return `${yyyy}-${mm}-${dd}`;
  }

  return "";
}


function showMessage(text, type="success"){
  const box = $("messageBox");
  if(!box) return;
  box.textContent = text;
  box.style.display = "block";
  box.style.backgroundColor = (type==="error") ? "#dc3545" : "#28a745";
  setTimeout(()=> box.style.display="none", 3000);
}

function scrollToRow(rowIndex){
  const rowEl = document.querySelector(`tr[data-rowindex="${rowIndex}"]`);
  if(!rowEl) return;
  rowEl.scrollIntoView({ behavior:"smooth", block:"center" });
  rowEl.classList.add("row-highlight");
  setTimeout(()=> rowEl.classList.remove("row-highlight"), 1500);
}

function renderRows(data){
  const tbody = $("tbody");
  if(!tbody) return;

  tbody.innerHTML = "";
  let sDistance = 0;

  data.forEach((r, i) => {
    const distance = Number(r.DistanceKm || 0);
    sDistance += distance;

    const dateTxt = toEnglishDigits(formatDateYYYYMMDD(r.Date));

    const tr = document.createElement("tr");
    tr.setAttribute("data-rowindex", r.rowIndex);

    tr.innerHTML = `
      <td>${i+1}</td>
      <td class="date-cell">${dateTxt}</td>
      <td>${distance}</td>
      <td class="action-col">
        <button type="button" class="action-btn edit-btn" onclick="startEdit(${r.rowIndex})">تعديل</button>
        <button type="button" class="action-btn delete-btn" onclick="deleteRow(${r.rowIndex})">حذف</button>
      </td>
    `;
    tbody.appendChild(tr);
  });

  if($("sumDistance")) $("sumDistance").textContent = sDistance;
}

function startEdit(rowIndex) {
  const row = rowsData.find(r => Number(r.rowIndex) === Number(rowIndex));
  if (!row) {
    showMessage("تعذر العثور على الصف", "error");
    return;
  }

  editRowIndex = Number(row.rowIndex);

  if ($("reportDate")) {
    $("reportDate").value = String(row.Date || "").split("T")[0];
  }

  if ($("distanceKm")) {
    $("distanceKm").value = row.DistanceKm ?? 0;
  }

  if ($("cancelEdit")) {
    $("cancelEdit").style.display = "inline-block";
  }

  window.scrollTo({ top: 0, behavior: "smooth" });
}

async function deleteRow(rowIndex) {
  if (!confirm("هل تريد حذف السطر؟")) return;

  try {
    const res = await fetch(SHEET_API, {
      method: "POST",
      body: new URLSearchParams({
        action: "delete",
        rowIndex: String(rowIndex)
      })
    });

    const json = await res.json();

    if(!json.ok){
      showMessage(json.msg || "فشل الحذف", "error");
      return;
    }

    showMessage("تم الحذف بنجاح");
    await loadData();

  } catch (err) {
    console.error(err);
    showMessage("فشل الاتصال بالخادم", "error");
  }
}

function applyDateFilter(){
  const from = normalizeDate($("fromDate")?.value || "");
  const to   = normalizeDate($("toDate")?.value || "");

  // بدون فلترة
  if(!from && !to){
    renderRows(rowsData);
    updateReportTitle();
    return;
  }

  const filtered = rowsData.filter(r => {
    const d = normalizeDate(r.Date);
    if(!d) return false;
    if(from && d < from) return false;
    if(to   && d > to) return false;
    return true;
  });

  renderRows(filtered);
  updateReportTitle();
}

function clearDateFilter(){
  if($("fromDate")) $("fromDate").value = "";
  if($("toDate")) $("toDate").value = "";
  renderRows(rowsData);
  updateReportTitle();
}


/* ===================== Load ===================== */

async function loadData(){
  const res = await fetch(`${SHEET_API}?action=list`);
  const json = await res.json();

  if(!json.ok){
    showMessage(json.msg || "فشل تحميل البيانات", "error");
    return;
  }

  rowsData = json.rows || [];

  // ✅ ترتيب: الأقدم فوق والجديد تحت
  rowsData.sort((a,b) => {
    const da = normalizeDate(a.Date);
    const db = normalizeDate(b.Date);
    // إذا التاريخ ناقص
    if(!da && !db) return 0;
    if(!da) return 1;
    if(!db) return -1;
    // ترتيب تصاعدي
    const c = da.localeCompare(db);
    // لو نفس التاريخ رتّب حسب rowIndex
    if(c !== 0) return c;
    return Number(a.rowIndex||0) - Number(b.rowIndex||0);
  });

  // طبق الفلترة الحالية
  applyDateFilter();

  if (pendingScrollRow) {
    scrollToRow(pendingScrollRow);
    pendingScrollRow = null;
  }
}

async function saveOrUpdate(e){
  e.preventDefault();

  const date = normalizeDate($("reportDate")?.value || "");
  if(!date){
    showMessage("التاريخ مطلوب بصيغة صحيحة", "error");
    return;
  }

  const payload = new URLSearchParams({
    action: editRowIndex ? "update" : "add",
    rowIndex: editRowIndex ? String(editRowIndex) : "",
    date: date,
    distanceKm: $("distanceKm")?.value || 0
  });

  const res = await fetch(SHEET_API, {
    method: "POST",
    body: payload
  });

  const json = await res.json();

  if(!json.ok){
    showMessage(json.msg || "فشل الحفظ", "error");
    return;
  }

  showMessage(editRowIndex ? "تم التعديل ✅" : "تم الحفظ ✅");

  editRowIndex = null;
  $("cancelEdit").style.display = "none";
  $("distanceForm").reset();

  // إعادة تعيين التاريخ لليوم (اختياري)
  $("reportDate").value = new Date().toISOString().slice(0,10);

  await loadData();
}


/* ===================== Events ===================== */

document.addEventListener("DOMContentLoaded", () => {

  // تاريخ افتراضي: اليوم
  if($("reportDate")){
    $("reportDate").value = new Date().toISOString().slice(0,10);
  }

  // حفظ
  $("distanceForm")?.addEventListener("submit", saveOrUpdate);

  // إلغاء تعديل
  $("cancelEdit")?.addEventListener("click", () => {
    editRowIndex = null;
    $("cancelEdit").style.display = "none";
    $("distanceForm")?.reset();
    if($("reportDate")){
      $("reportDate").value = new Date().toISOString().slice(0,10);
    }
    applyDateFilter();
  });

  // زر تطبيق الفلترة + مسح
  $("filterBtn")?.addEventListener("click", applyDateFilter);
  $("clearFilterBtn")?.addEventListener("click", clearDateFilter);

  // فلترة مباشرة عند تغيير التواريخ (اختياري)
  $("fromDate")?.addEventListener("change", applyDateFilter);
  $("toDate")?.addEventListener("change", applyDateFilter);

  // بحث
  $("searchInput")?.addEventListener("input", () => {
    const q = $("searchInput").value.toLowerCase().trim();
    if(!q) return applyDateFilter();

    const filtered = rowsData.filter(r =>
      Object.values(r).some(v => String(v ?? "").toLowerCase().includes(q))
    );
    renderRows(filtered);
  });

  updateReportTitle();
  loadData();
});

/* ===================== Export ===================== */

function exportToExcel(){
  const wb = XLSX.utils.table_to_book(document.getElementById("distanceTable"), { sheet:"تقرير المسافة" });
  XLSX.writeFile(wb, "تقرير_المسافة.xlsx");
}
</script>
</body>
</html>
